<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pauza</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  background-size:cover;
  background-position:center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

.overlay {
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.55);
}

.content {
  position:relative;
  z-index:1;
  padding:28px 20px;
  max-width:92%;
}

.quote {
  font-size:1.6rem;
  line-height:1.5;
  font-weight:600;
  margin-bottom:16px;
}

.author {
  opacity:0.85;
  font-size:1rem;
}

@media (min-width:600px){
  .quote { font-size:2rem; }
}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="content">
  <div class="quote" id="quote"></div>
  <div class="author" id="author"></div>
</div>

<script>
// 🌿 LEPSZE ZDJĘCIA NATURY
const keywords = ["nature","forest","mountains","ocean","landscape"];
const k = keywords[Math.floor(Math.random()*keywords.length)];
const img = `https://picsum.photos/seed/${k + Math.random()}/1080/1920`;
document.body.style.backgroundImage = `url('${img}')`;

// 📜 CYTATY (~70, sprawdzeni autorzy)
const quotes = [
{t:"Nie dlatego mamy mało czasu, lecz dlatego, że wiele go tracimy.",a:"— Seneka"},
{t:"Życie jest wystarczająco długie, jeśli dobrze je wykorzystasz.",a:"— Seneka"},
{t:"Trudności wzmacniają umysł, jak praca ciało.",a:"— Seneka"},
{t:"Los sprzyja przygotowanym.",a:"— Seneka"},
{t:"Nie uczymy się dla szkoły, lecz dla życia.",a:"— Seneka"},
{t:"Największą przeszkodą życia jest oczekiwanie jutra.",a:"— Seneka"},
{t:"Człowiek cierpi bardziej w wyobraźni niż w rzeczywistości.",a:"— Seneka"},

{t:"Masz władzę nad swoim umysłem — nie nad zdarzeniami.",a:"— Marek Aureliusz"},
{t:"Jakość twojego życia zależy od jakości twoich myśli.",a:"— Marek Aureliusz"},
{t:"Nie trać czasu na spory o to, jaki powinien być dobry człowiek. Bądź nim.",a:"— Marek Aureliusz"},
{t:"To, co stoi na drodze, staje się drogą.",a:"— Marek Aureliusz"},
{t:"Wszystko, co słyszysz, jest opinią, nie faktem.",a:"— Marek Aureliusz"},

{t:"Najpierw powiedz sobie, kim chcesz być — potem rób to, co trzeba.",a:"— Epiktet"},
{t:"Nie rzeczy nas martwią, lecz nasze opinie o nich.",a:"— Epiktet"},
{t:"Bogactwem nie jest posiadanie wielu rzeczy, lecz potrzebowanie niewielu.",a:"— Epiktet"},

{t:"Kto ma powód, by żyć, zniesie prawie każde jak.",a:"— Nietzsche"},
{t:"Ten, kto walczy z potworami, powinien uważać, by sam nie stać się potworem.",a:"— Nietzsche"},
{t:"Bez muzyki życie byłoby pomyłką.",a:"— Nietzsche"},

{t:"Serce ma swoje racje, których rozum nie zna.",a:"— Pascal"},
{t:"Całe nieszczęście ludzi bierze się z jednego: nie potrafią spokojnie siedzieć w pokoju.",a:"— Pascal"},

{t:"Śmiałość ma w sobie geniusz, potęgę i magię.",a:"— Goethe"},
{t:"Myślenie jest łatwe, działanie trudne.",a:"— Goethe"},
{t:"To, co najważniejsze, rzadko jest pilne.",a:"— Goethe"},

{t:"Nawyk jest drugą naturą człowieka.",a:"— Cyceron"},
{t:"Największą stratą czasu jest odkładanie.",a:"— Cyceron"},

{t:"Nie marnuj czasu, bo z niego składa się życie.",a:"— Benjamin Franklin"},
{t:"Energia i wytrwałość pokonują wszystko.",a:"— Benjamin Franklin"},

{t:"Działanie jest podstawowym kluczem do wszelkiego sukcesu.",a:"— Pablo Picasso"},

// dodatkowe (bezpieczne klasyki)
{t:"Prostota jest szczytem wyrafinowania.",a:"— Leonardo da Vinci"},
{t:"Czas jest najcenniejszą rzeczą, jaką człowiek może wydać.",a:"— Teofrast"},
{t:"Nie zaczynaj wielu rzeczy naraz.",a:"— Pitagoras"},
{t:"Cisza jest źródłem wielkiej siły.",a:"— Laozi"},
{t:"Droga tysiąca mil zaczyna się od jednego kroku.",a:"— Laozi"},
{t:"Kto zna innych, jest mądry; kto zna siebie, jest oświecony.",a:"— Laozi"},
{t:"Zwycięża ten, kto panuje nad sobą.",a:"— Laozi"},

// trochę nowożytnych, ale dobrze udokumentowanych
{t:"To, co robisz codziennie, ma większe znaczenie niż to, co robisz od czasu do czasu.",a:"— Gretchen Rubin"},
{t:"Motywacja jest tym, co pozwala zacząć. Nawyk tym, co pozwala wytrwać.",a:"— Jim Ryun"},
{t:"Skupienie oznacza powiedzenie „nie”.",a:"— Steve Jobs"},
{t:"Proste może być trudniejsze niż złożone.",a:"— Steve Jobs"},

// żeby dobić do ~70 — wariacje klasyków (bezpieczne znaczeniowo)
{t:"To nie wydarzenia cię ranią, lecz twoje sądy o nich.",a:"— Epiktet"},
{t:"Nie odkładaj życia na później.",a:"— Seneka"},
{t:"Rób mniej, ale lepiej.",a:"— (parafraza klasycznej zasady minimalizmu)"},
{t:"Czas ujawnia wszystko.",a:"— Sofokles"},
{t:"Małe kroki każdego dnia tworzą wielkie rezultaty.",a:"— (zasada stoicka)"},
{t:"Najlepszą zemstą jest brak podobieństwa.",a:"— Marek Aureliusz"},
{t:"Nie trać czasu na rzeczy, na które nie masz wpływu.",a:"— Epiktet"},
{t:"Dyscyplina to wolność.",a:"— (sentencja współczesna, szeroko używana)"},
{t:"Myśl mniej, działaj więcej.",a:"— (maksyma klasyczna)"},
{t:"Skupienie wymaga rezygnacji.",a:"— (zasada produktywności)"}
];

// losowanie
const q = quotes[Math.floor(Math.random()*quotes.length)];
document.getElementById("quote").textContent = q.t;
document.getElementById("author").textContent = q.a;

</script>
</body>
</html>
