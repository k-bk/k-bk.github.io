<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pauza</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  background-size:cover;
  background-position:center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

.overlay {
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.45);
}

.content {
  position:relative;
  z-index:1;
  padding:28px 20px;
  max-width:92%;
}

.quote {
  font-size:1.6rem;
  line-height:1.5;
  font-weight:600;
  margin-bottom:16px;
}

.author {
  opacity:0.85;
  font-size:1rem;
}

@media (min-width:600px){
  .quote { font-size:2rem; }
}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="content">
  <div class="quote" id="quote"></div>
  <div class="author" id="author"></div>
</div>

<script>
  
const keywords = ["nature","forest","mountains","ocean","rocks","animal","rural","calm","sunset"];
const k = keywords[Math.floor(Math.random()*keywords.length)];
const img = `https://picsum.photos/seed/${k + Math.random()}/1080/1920`;
document.body.style.backgroundImage = `url('${img}')`;

const quotes = [
{t:"Mądry człowiek, zapytany, jak nauczył się tak wiele o wszystkim, odpowie: “Ponieważ nigdy nie wstydziłem się ani nie bałem zadawać pytań na tematy, w których byłem ignorantem”.",a:"— John Abbott"},
{t:"Wszystko, co nie podoba się nam u innych, może pomóc w lepszym poznaniu samych siebie.",a:"— Carl Gustav Jung"},
{t:"Patrzeć bez zawiści, jak inni osiągają sukcesy, do których samemu się dąży, to wielkość.",a:"— Marie von Ebner-Eschenbach"},
{t:"Tylko ci, którzy nauczyli się potęgi szczerego i bezinteresownego wkładu w życie innych, doświadczają największej radości życia – prawdziwego poczucia spełnienia.",a:"— Anthony Robbins"},
{t:"Wkładaj swoje serce, umysł, mądrość i duszę nawet w swoje najmniejsze zadania. Oto sekret sukcesu.",a:"— Swami Sivananda"},
{t:"W dwa miesiące możesz zdobyć więcej przyjaciół, interesując się innymi ludźmi, niż w ciągu dwóch lat, usiłując zainteresować sobą innych.",a:"— Dale Carnegie"},
{t:"Czas to nie droga szybkiego ruchu pomiędzy kołyską a grobem; czas – to miejsce na zaparkowanie pod słońcem.",a:"— Phil Bosmans"},
{t:"Naucz się śmiać ze swoich kłopotów, a nigdy nie skończą ci się powody do śmiechu.",a:"— Lyn Karol"},
{t:"Chorobą, która zatruwa ludzkie życie, jest powaga.",a:"— Luke Rhinehart"},
{t:"Zdarzenia rosną i potęgują się wraz z charakterem.",a:"— Ralph Waldo Emerson"},

{t:"Posiadamy w sobie niewyobrażalną siłę, która może nas uczynić panami siebie.",a:"— Emile Coue"},
{t:"Człowiek, który wysoko umieścił sobie poprzeczkę i jest zażenowany dlatego, że się starał najlepiej jak mógł, jest człowiekiem sukcesu, nawet jeśli świat przypisze mu porażkę.",a:"— Bertie Charles Forbes"},
{t:"Nawet jeśli ktoś jest zamiataczem ulic, powinien zamiatać ulice tak, jak Michał Anioł malował albo Beethoven komponował muzykę, albo Shakespeare tworzył poezję.",a:"— Martin Luther King, Jr"},
{t:"Jeśli będziesz się skupiać na tym, co już w życiu masz – będziesz mieć coraz więcej.",a:"— Oprah Winfrey"},
{t:"Dopóki nie podważymy mitów i nie opracujemy naszego własnego systemu przekonań opartych na prawdzie, nigdy nie zdołamy spełnić swoich marzeń.",a:"— Diane Tracy"},
{t:"Myśl jest realną siłą i naprawdę staje się potęgą.",a:"— Napoleon Hill"},
{t:"Życie jest albo pełną wyzwań przygodą, albo niczym.",a:"— Helen Keller"},
{t:"Każdą rewolucyjną ideę można podsumować trzema fazami – to niemożliwe, nie będę marnować czasu – to możliwe, ale nie warte zachodu – mówiłem przez cały czas, że to był dobry pomysł.",a:"— Arthur C. Clarke"},
{t:"Człowiek z głową, raz zyskawszy punkt zaczepienia, dochodzi do wszystkiego, kiedy sam zechce!",a:"— Honoré de Balzac"},
{t:"Bogaty jest taki człowiek, dla którego świat jest nieustannym odkrywaniem.",a:"— Georges Duhamel"},

{t:"Dla wielkich czynów niewiele pomaga zbytnia przezorność i zimna odwaga.",a:"— Jean de La Fontaine"},
{t:"Żadne położenie nie jest aż tak straszne, by człowiek obdarzony równowagą ducha nie znalazł w nim jakiejś pociechy.",a:"— Seneka Młodszy"},
{t:"Twój czas jest ograniczony, więc nie marnuj go na byciem kimś, kim nie jesteś.",a:"— Steve Jobs"},
{t:"Ludzie stają się naprawdę niesamowici dopiero wtedy, gdy uwierzą, że mogą coś osiągnąć.",a:"— Norman Vincent Peale"},
{t:"Im bardziej pomożesz innym ludziom, tym bardziej oni będą chcieli Ci pomóc.",a:"— Brian Tracy"},
{t:"To, co widzimy, zależy głównie od tego, co chcemy zobaczyć.",a:"— John Lubbock"},
{t:"Jak możesz spodziewać się więcej od wszechświata, jeżeli nie umiesz docenić tego, co już masz?",a:"— Kurt Vonnegut"},
{t:"Jakże często szczęście bywa zaprzepaszczone przez zbyt długie przygotowania – głupie przygotowania!",a:"— Jane Austen"},
{t:"Porażka nie czyni Cię przegranym.",a:"— Richard Exely"},
{t:"Może się zdarzyć, że urodziłeś się bez skrzydeł, ale najważniejsze, żebyś nie przeszkadzał im wyrosnąć.",a:"— Coco Chanel"},

{t:"Człowiek przede wszystkim musi mieć odwagę być sobą.",a:"— Milan Kundera"},
{t:"Nie ma co się dręczyć.",a:"— Ewa Nowak"},
{t:"Ciekawość jest najpotężniejszą siłą napędową w kosmosie.",a:"— Walter Moers"},
{t:"Najrzadsza jest odwaga myślenia.",a:"— Anatole France"},
{t:"Fałszywe ambicje każą zajść szybko, prawdziwe ambicje każą zajść wysoko.",a:"— Gilbert Cebron"},

{t:"Wielcy ludzie wydzielają blask, który opromienia serca innych.",a:"— Yoshimoto Banana"},
{t:"Grzecznością więcej wskórasz niż surowością.",a:"— Ezop"},
{t:"Trudne życie to nie kara, tylko zadanie.",a:"— Mieczysław Maliński"},
{t:"Bez wiary potykamy się o źdźbło słomy, z wiarą przenosimy góry.",a:"— Søren Kierkegaard"},
{t:"Jak długo istnieje życie, tak długo istnieć będą nadzieje.",a:"— Teokryt"},
{t:"Świat jest miejscem cudów, lecz samemu jest się największym cudem.",a:"— Jonathan Carroll"},
{t:"Najdalej zajdzie ten człowiek, który wie, dokąd idzie.",a:"— Napoleon Bonaparte"},
{t:"Nic się nie spełni, jeśli nie jest wpierw marzeniem.",a:"— Carl Sandburg"},
{t:"Wszystkie wielkie osiągnięcia potrzebują czasu.",a:"— David J. Schwartz"},
{t:"Sukces jest podróżą, nie celem.",a:"— Ben Sweetland"},

{t:"Inspiracja istnieje, ale musi zastać cię przy pracy.",a:"— Pablo Picasso"},
{t:"Przestań myśleć o porażce jako o jednej z opcji.",a:"— Joan Lunden"},
{t:"Nie starzeje się ten, kto nie ma na to czasu.",a:"— Benjamin Franklin"},
{t:"Mając pewność siebie, wygrałeś, zanim jeszcze wystartowałeś.",a:"— Marcus Garvey"},
{t:"Jesteś jedyną osobą na świecie, która może wykorzystać twój potencjał.",a:"— Zig Ziglar"},
{t:"Talent to tylko wielka cierpliwość.",a:"— Anatol France"},
{t:"Zmień się, zanim będziesz musiał.",a:"— Jack Welch"},
{t:"Nadzieja jest ryzykiem, które trzeba podjąć.",a:"— Georges Bernanos"},
{t:"Nic tak nie przynosi powodzenia jak sukces.",a:"— Alexandre Dumas"},
{t:"W ludziach więcej rzeczy zasługuje na podziw niż na pogardę.",a:"— Albert Camus"}
];

const q = quotes[Math.floor(Math.random()*quotes.length)];
document.getElementById("quote").textContent = q.t;
document.getElementById("author").textContent = q.a;

</script>
</body>
</html>
